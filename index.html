<!DOCTYPE html>
<html lang="en">
<head>
 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QKR | QR Code Generator</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<div class="background">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<header>

    <div class="logo">

        <h2>QKR</h2>

    </div>

    <nav>

        <a href="index.html" class="active">Home</a>

        <a href="about.html">About</a>

    </nav>

</header>

<section class="hero">

    <div class="glass">

        <h1>Create Your QR Code</h1>

        <p>
            Convert any website link into a beautiful QR Code instantly.
        </p>

        <div class="inputBox">

            <input
                type="text"
                id="qrText"
                placeholder="Paste your website link here..."
            >

        </div>

        <div class="buttons">

            <button id="generateBtn">

                Generate QR

            </button>

            <button id="clearBtn">

                Clear

            </button>

        </div>

        <div id="imgBox">

            <div id="qrcode"></div>

        </div>

    </div>

</section>

<footer>

    <p>

        QKR |
        Designed by <span>Rayan Khidir Ahmed</span>

    </p>

</footer>

<script src="script.js"></script>

</body>
</html>
